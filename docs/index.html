<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue Page Motion Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            overflow-x: hidden;
        }

        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 80px;
            right: 24px;
            z-index: 1000;
            background: #fff;
            border: 2px solid #ddd;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            border-color: #409eff;
            color: #409eff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(64, 158, 255, 0.3);
        }

        /* 导航栏样式 */
        .navbar {
            background: #001529;
            padding: 0 24px;
            height: 64px;
            line-height: 64px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 0;
            list-style: none;
            max-width: 1200px;
            margin: 0 auto;
            height: 100%;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.65);
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 14px;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-links a.router-link-active {
            color: #fff;
            background: #1890ff;
            border-bottom-color: #fff;
        }

        /* 页面容器 */
        .page {
            flex: 1;
            padding: 24px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .page h1 {
            color: #262626;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 500;
        }

        .page p {
            color: #595959;
            line-height: 1.8;
            margin-bottom: 16px;
            font-size: 14px;
        }

        /* 不同页面的背景色 */
        .home,
        .about,
        .contact,
        .settings {
            background: #f0f2f5;
        }

        /* 功能说明卡片 */
        .info-card {
            background: #fff;
            padding: 24px;
            border-radius: 4px;
            margin-top: 16px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
            border: 1px solid #e8e8e8;
        }

        .info-card h2 {
            color: #262626;
            margin-bottom: 16px;
            font-size: 16px;
            font-weight: 500;
        }

        .info-card ul {
            list-style: none;
            padding: 0;
        }

        .info-card li {
            color: #595959;
            line-height: 2;
            padding-left: 24px;
            position: relative;
            font-size: 14px;
        }

        .info-card li:before {
            content: '';
            position: absolute;
            left: 0;
            top: 10px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #1890ff;
        }

        .info-card code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 2px;
            font-family: 'Courier New', monospace;
            color: #cf1322;
            font-size: 12px;
            border: 1px solid #d9d9d9;
        }

        /* 现代风格主题 */
        body.modern-theme {
            background: #f5f5f5;
        }

        body.modern-theme .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 0 24px;
            height: 64px;
            line-height: 64px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        body.modern-theme .nav-links a {
            color: #333;
            padding: 0 24px;
            border-radius: 0;
            border-bottom: none;
        }

        body.modern-theme .nav-links a:hover {
            background: rgba(64, 158, 255, 0.1);
            color: #409eff;
        }

        body.modern-theme .nav-links a.router-link-active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        body.modern-theme .page h1 {
            color: #333;
        }

        body.modern-theme .page p {
            color: #666;
        }
    </style>
  <script type="module" crossorigin src="./assets/index-Bc-gzoOL.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DwAOPNOH.css">
</head>
<body>
    <div id="app"></div>
</body>
</html>
